<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rudra Patel — ML Engineer & AI Researcher</title>
  <meta name="description" content="Portfolio of Rudra Patel — ML Engineer, AI Researcher, and NASA ARCS Lab Research Assistant." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    /* ─── Reset & Base ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #070709;
      --bg-2:      #0e0e11;
      --bg-3:      #161619;
      --accent:    #F7B731;
      --accent-lo: rgba(247, 183, 49, 0.10);
      --accent-md: rgba(247, 183, 49, 0.22);
      --text:      #E2E2E2;
      --muted:     #888;
      --border:    rgba(255, 255, 255, 0.07);
      --radius:    12px;
      --sans:      'Geist', Arial, sans-serif;
      --mono:      'Geist Mono', ui-monospace, SFMono-Regular, monospace;
      --ease:      0.28s cubic-bezier(0.4, 0, 0.2, 1);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    a { color: inherit; text-decoration: none; }
    ul { list-style: none; }
    img { display: block; max-width: 100%; }

    /* ─── Navigation ────────────────────────────────────────────── */
    #nav {
      position: fixed;
      inset: 0 0 auto 0;
      z-index: 900;
      height: 62px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2.5rem;
      background: rgba(7, 7, 9, 0.82);
      backdrop-filter: blur(18px) saturate(1.4);
      -webkit-backdrop-filter: blur(18px) saturate(1.4);
      border-bottom: 1px solid var(--border);
      transition: box-shadow var(--ease);
    }

    #nav.scrolled {
      box-shadow: 0 4px 40px rgba(0,0,0,0.5);
    }

    .nav-logo {
      font-family: var(--mono);
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -0.02em;
    }

    .nav-logo span { color: var(--muted); font-weight: 400; }

    .nav-links {
      display: flex;
      gap: 2.2rem;
      align-items: center;
    }

    .nav-links a {
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: color var(--ease);
      position: relative;
    }

    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0; right: 0;
      height: 1px;
      background: var(--accent);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform var(--ease);
    }

    .nav-links a:hover,
    .nav-links a.active { color: var(--accent); }
    .nav-links a:hover::after,
    .nav-links a.active::after { transform: scaleX(1); }

    /* Hamburger */
    .nav-toggle {
      display: none;
      flex-direction: column;
      gap: 5px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 6px;
      z-index: 910;
    }

    .nav-toggle span {
      display: block;
      width: 22px;
      height: 2px;
      background: var(--text);
      border-radius: 2px;
      transition: all var(--ease);
    }

    .nav-toggle.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .nav-toggle.open span:nth-child(2) { opacity: 0; }
    .nav-toggle.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    .nav-mobile {
      display: none;
      position: fixed;
      inset: 62px 0 0 0;
      background: rgba(7, 7, 9, 0.97);
      z-index: 800;
      padding: 2rem;
      flex-direction: column;
      gap: 0;
      border-top: 1px solid var(--border);
    }

    .nav-mobile.open { display: flex; }

    .nav-mobile a {
      font-size: 1.3rem;
      font-weight: 600;
      color: var(--muted);
      padding: 1rem 0;
      border-bottom: 1px solid var(--border);
      transition: color var(--ease);
    }

    .nav-mobile a:hover { color: var(--accent); }

    /* ─── Layout primitives ─────────────────────────────────────── */
    section { position: relative; }

    .container {
      max-width: 1080px;
      margin: 0 auto;
      padding: 0 2rem;
    }

    .sec-pad { padding: 7rem 0; }

    .sec-eyebrow {
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--accent);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 0.6rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .sec-eyebrow::before {
      content: '';
      width: 26px;
      height: 1px;
      background: var(--accent);
      flex-shrink: 0;
    }

    .sec-title {
      font-size: clamp(1.9rem, 3.5vw, 2.8rem);
      font-weight: 600;
      letter-spacing: -0.05em;
      line-height: 1.1;
      margin-bottom: 3.5rem;
      font-feature-settings: "liga" 1;
    }

    .sec-title em {
      background: linear-gradient(135deg, #F7B731, #ff8c42);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-style: normal;
    }

    /* ─── Scroll Animations ─────────────────────────────────────── */
    .fade-up {
      opacity: 0;
      transform: translateY(28px);
      transition: opacity 0.65s ease, transform 0.65s ease;
    }

    .fade-up.in { opacity: 1; transform: translateY(0); }

    /* Stagger helper */
    .fade-up[data-delay="1"] { transition-delay: 0.08s; }
    .fade-up[data-delay="2"] { transition-delay: 0.16s; }
    .fade-up[data-delay="3"] { transition-delay: 0.24s; }
    .fade-up[data-delay="4"] { transition-delay: 0.32s; }
    .fade-up[data-delay="5"] { transition-delay: 0.40s; }

    /* ─── HERO ──────────────────────────────────────────────────── */
    #hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      padding-top: 62px;
      overflow: hidden;
    }

    #hero .container { position: relative; z-index: 2; padding-top: 4rem; padding-bottom: 4rem; }

    /* Dot-grid background */
    #hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle, rgba(247,183,49,0.18) 1px, transparent 1px);
      background-size: 28px 28px;
      mask-image: radial-gradient(ellipse 70% 90% at 90% 40%, black 0%, transparent 70%);
      -webkit-mask-image: radial-gradient(ellipse 70% 90% at 90% 40%, black 0%, transparent 70%);
      pointer-events: none;
    }

    /* Ambient glow — much stronger */
    #hero::after {
      content: '';
      position: absolute;
      top: 10%;
      right: 5%;
      width: 700px;
      height: 700px;
      background: radial-gradient(circle, rgba(247,183,49,0.18) 0%, rgba(247,183,49,0.06) 40%, transparent 70%);
      pointer-events: none;
    }

    /* Second glow on left */
    #hero .container::before {
      content: '';
      position: absolute;
      bottom: -10%;
      left: -15%;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(99,102,241,0.12) 0%, transparent 65%);
      pointer-events: none;
      z-index: -1;
    }

    .hero-label {
      font-family: var(--mono);
      font-size: 0.75rem;
      color: #4ade80;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 1.6rem;
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
      background: rgba(74,222,128,0.08);
      border: 1px solid rgba(74,222,128,0.25);
      padding: 0.35rem 0.9rem;
      border-radius: 9999px;
    }

    .hero-label::before {
      content: '';
      width: 7px;
      height: 7px;
      background: #4ade80;
      border-radius: 50%;
      box-shadow: 0 0 8px rgba(74,222,128,0.8);
      animation: pulse-dot 2s ease-in-out infinite;
      flex-shrink: 0;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; box-shadow: 0 0 8px rgba(74,222,128,0.8); }
      50%       { opacity: 0.6; box-shadow: 0 0 16px rgba(74,222,128,0.4); }
    }

    .hero-name {
      font-size: clamp(3.8rem, 10vw, 8rem);
      font-weight: 600;
      line-height: 0.92;
      letter-spacing: -0.06em;
      margin-bottom: 1.5rem;
      font-feature-settings: "liga" 1;
    }

    .hero-name .line2 {
      background: linear-gradient(135deg, #F7B731 0%, #ff8c42 50%, #F7B731 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      background-size: 200% 200%;
      animation: gradient-shift 4s ease infinite;
    }

    @keyframes gradient-shift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .hero-title {
      font-size: clamp(1.1rem, 2.2vw, 1.5rem);
      color: var(--muted);
      font-weight: 300;
      margin-bottom: 1.4rem;
      letter-spacing: -0.01em;
    }

    .hero-bio {
      font-size: 1.05rem;
      color: var(--muted);
      max-width: 520px;
      line-height: 1.75;
      margin-bottom: 2.5rem;
    }

    .hero-ctas { display: flex; gap: 0.8rem; flex-wrap: wrap; }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      padding: 0.65rem 1.4rem;
      border-radius: 6px;
      font-size: 0.875rem;
      font-weight: 500;
      transition: all var(--ease);
      border: none;
      cursor: pointer;
      white-space: nowrap;
      letter-spacing: -0.01em;
      font-feature-settings: "liga" 1;
    }

    .btn-primary {
      background: var(--accent);
      color: #000;
      box-shadow: 0px 0px 0px 1px rgba(247,183,49,0.8), 0px 2px 8px rgba(247,183,49,0.2);
    }

    .btn-primary:hover {
      background: rgba(247,183,49,0.88);
      box-shadow: 0px 0px 0px 1px rgba(247,183,49,1), 0px 4px 16px rgba(247,183,49,0.3);
    }

    .btn-ghost {
      background: transparent;
      color: var(--text);
      box-shadow: 0px 0px 0px 1px rgba(255,255,255,0.1);
    }

    .btn-ghost:hover {
      box-shadow: 0px 0px 0px 1px rgba(247,183,49,0.5);
      color: var(--accent);
    }

    .scroll-hint {
      position: absolute;
      bottom: 2.5rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 0.68rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      animation: nudge 2.2s ease-in-out infinite;
    }

    .scroll-hint svg { opacity: 0.5; }

    @keyframes nudge {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50%       { transform: translateX(-50%) translateY(6px); }
    }

    /* ─── ABOUT ─────────────────────────────────────────────────── */
    #about { background: var(--bg-2); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }

    .about-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4rem;
      align-items: start;
    }

    .about-text {
      font-size: 1.05rem;
      color: var(--muted);
      line-height: 1.8;
    }

    .about-text + .about-text { margin-top: 1rem; }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.2rem;
    }

    .stat-card {
      background: var(--bg-3);
      border: none;
      box-shadow: 0px 0px 0px 1px rgba(255,255,255,0.07), 0px 2px 8px rgba(0,0,0,0.35), 0px 0px 0px 1px rgba(7,7,9,0.8) inset;
      border-radius: var(--radius);
      padding: 1.2rem;
      transition: box-shadow var(--ease);
    }

    .stat-card:hover {
      box-shadow: 0px 0px 0px 1px rgba(247,183,49,0.3), 0px 4px 16px rgba(0,0,0,0.45), 0px 0px 0px 1px rgba(7,7,9,0.8) inset;
    }

    .stat-value {
      font-size: 2.2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #F7B731, #ff8c42);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      margin-bottom: 0.3rem;
      font-family: var(--mono);
    }

    .stat-label {
      font-size: 0.78rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: 500;
    }

    /* ─── EXPERIENCE ────────────────────────────────────────────── */
    .timeline {
      position: relative;
      padding-left: 2rem;
    }

    .timeline::before {
      content: '';
      position: absolute;
      left: 0;
      top: 10px;
      bottom: 10px;
      width: 1px;
      background: linear-gradient(to bottom, var(--accent), transparent 90%);
    }

    .timeline-item {
      position: relative;
      background: var(--bg-2);
      border: none;
      box-shadow: 0px 0px 0px 1px rgba(255,255,255,0.06), 0px 2px 12px rgba(0,0,0,0.4);
      border-radius: var(--radius);
      padding: 1.6rem;
      margin-bottom: 1.5rem;
      transition: box-shadow var(--ease), transform var(--ease);
    }

    .timeline-item:last-child { margin-bottom: 0; }

    .timeline-item:hover {
      box-shadow: 0px 0px 0px 1px rgba(247,183,49,0.25), 0px 4px 20px rgba(0,0,0,0.5);
      transform: translateX(5px);
    }

    .timeline-item::before {
      content: '';
      position: absolute;
      left: calc(-2rem - 4px);
      top: 1.75rem;
      width: 9px;
      height: 9px;
      background: var(--accent);
      border-radius: 50%;
      box-shadow: 0 0 12px rgba(247,183,49,0.6);
    }

    .exp-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 0.25rem;
    }

    .exp-company {
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--text);
    }

    .exp-badge {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--accent);
      background: var(--accent-lo);
      border: 1px solid var(--accent-md);
      padding: 0.18rem 0.55rem;
      border-radius: 5px;
      white-space: nowrap;
    }

    .exp-role {
      font-size: 0.88rem;
      color: var(--accent);
      font-weight: 500;
      margin-bottom: 1rem;
    }

    .exp-bullets { display: flex; flex-direction: column; gap: 0.55rem; }

    .exp-bullets li {
      font-size: 0.9rem;
      color: var(--muted);
      padding-left: 1.1rem;
      position: relative;
      line-height: 1.65;
    }

    .exp-bullets li::before {
      content: '▸';
      position: absolute;
      left: 0;
      color: var(--accent);
      font-size: 0.7rem;
      top: 0.2rem;
    }

    /* ─── PROJECTS ──────────────────────────────────────────────── */
    #projects { background: var(--bg-2); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }

    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
      gap: 1.4rem;
    }

    .project-card {
      background: rgba(22,22,25,0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: none;
      box-shadow: 0px 0px 0px 1px rgba(255,255,255,0.09), 0px 4px 24px rgba(0,0,0,0.5), 0px 1px 0px rgba(255,255,255,0.04) inset;
      border-radius: var(--radius);
      padding: 1.6rem;
      display: flex;
      flex-direction: column;
      gap: 0.9rem;
      position: relative;
      overflow: hidden;
      transition: box-shadow var(--ease), transform var(--ease);
    }

    /* Gold top bar on hover */
    .project-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: var(--accent);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform var(--ease);
    }

    .project-card:hover {
      box-shadow: 0px 0px 0px 1px rgba(247,183,49,0.4), 0px 12px 40px rgba(0,0,0,0.6), 0px 0px 30px rgba(247,183,49,0.06);
      transform: translateY(-6px);
    }

    .project-card:hover::before { transform: scaleX(1); }

    .project-num {
      font-family: var(--mono);
      font-size: 0.68rem;
      color: var(--accent);
      opacity: 0.5;
      letter-spacing: 0.1em;
    }

    .project-title {
      font-size: 1.08rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1.3;
    }

    .project-desc {
      font-size: 0.88rem;
      color: var(--muted);
      line-height: 1.7;
      flex: 1;
    }

    .tech-chips { display: flex; flex-wrap: wrap; gap: 0.35rem; }

    .chip {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--accent);
      background: var(--accent-lo);
      border: 1px solid var(--accent-md);
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
    }

    .project-links { display: flex; gap: 0.6rem; margin-top: 0.2rem; }

    .project-link {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.78rem;
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 0.25rem 0.65rem;
      transition: all var(--ease);
    }

    .project-link:hover { color: var(--accent); border-color: var(--accent-md); }

    /* ─── SKILLS ────────────────────────────────────────────────── */
    .skills-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
      gap: 1.2rem;
    }

    .skill-group {
      background: var(--bg-2);
      border: none;
      box-shadow: 0px 0px 0px 1px rgba(255,255,255,0.06), 0px 2px 8px rgba(0,0,0,0.3);
      border-radius: var(--radius);
      padding: 1.4rem;
      transition: box-shadow var(--ease);
    }

    .skill-group:hover {
      box-shadow: 0px 0px 0px 1px rgba(247,183,49,0.25), 0px 4px 16px rgba(0,0,0,0.4);
    }

    .skill-cat {
      font-family: var(--mono);
      font-size: 0.68rem;
      color: var(--accent);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding-bottom: 0.75rem;
      margin-bottom: 0.9rem;
      border-bottom: 1px solid var(--border);
    }

    .skill-pills { display: flex; flex-wrap: wrap; gap: 0.4rem; }

    .pill {
      font-size: 0.8rem;
      color: var(--text);
      background: var(--bg-3);
      border: 1px solid var(--border);
      padding: 0.28rem 0.65rem;
      border-radius: 5px;
      transition: all var(--ease);
      cursor: default;
    }

    .pill:hover {
      background: var(--accent-lo);
      border-color: var(--accent-md);
      color: var(--accent);
    }

    /* ─── EDUCATION ─────────────────────────────────────────────── */
    #education { background: var(--bg-2); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }

    .edu-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 1.4rem;
      margin-bottom: 3.5rem;
    }

    .edu-card {
      background: var(--bg-3);
      border: none;
      box-shadow: 0px 0px 0px 1px rgba(255,255,255,0.07), 0px 2px 8px rgba(0,0,0,0.35), 0px 0px 0px 1px rgba(7,7,9,0.8) inset;
      border-radius: var(--radius);
      padding: 1.6rem;
      position: relative;
      overflow: hidden;
      transition: box-shadow var(--ease);
    }

    .edu-card:hover {
      box-shadow: 0px 0px 0px 1px rgba(247,183,49,0.25), 0px 4px 20px rgba(0,0,0,0.45), 0px 0px 0px 1px rgba(7,7,9,0.8) inset;
    }

    .edu-card .glyph {
      position: absolute;
      top: 1.4rem; right: 1.4rem;
      font-size: 1.8rem;
      opacity: 0.12;
      pointer-events: none;
    }

    .edu-school { font-size: 1rem; font-weight: 600; color: var(--text); margin-bottom: 0.3rem; }
    .edu-degree { font-size: 0.9rem; color: var(--accent); font-weight: 500; margin-bottom: 0.25rem; }
    .edu-dates { font-family: var(--mono); font-size: 0.72rem; color: var(--muted); margin-bottom: 0.75rem; }
    .edu-details { font-size: 0.84rem; color: var(--muted); line-height: 1.55; }

    /* Certifications */
    .certs-eyebrow {
      font-family: var(--mono);
      font-size: 0.68rem;
      color: var(--muted);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 1rem;
    }

    .certs-list { display: flex; flex-direction: column; gap: 0.6rem; }

    .cert-item {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      padding: 0.75rem 1rem;
      background: var(--bg-3);
      border: none;
      box-shadow: 0px 0px 0px 1px rgba(255,255,255,0.06);
      border-radius: 8px;
      font-size: 0.88rem;
      color: var(--muted);
      transition: box-shadow var(--ease), color var(--ease);

      color: var(--text);

      width: 6px; height: 6px;
      background: var(--accent);
      border-radius: 50%;
      flex-shrink: 0;

      transition: border-color var(--ease);

      margin: 0 auto 3rem;
      font-size: 1.05rem;
      color: var(--muted);
      line-height: 1.75;

      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));

      text-align: left;

      align-items: center;
      gap: 0.85rem;

// ─── RENDER: Navigation ────────────────────────────────────────────────────
function renderNav() {
  const nav = document.getElementById('nav');
  const mobile = document.getElementById('navMobile');
  const links = ['about', 'experience', 'projects', 'skills', 'education', 'human', 'contact'];

  nav.innerHTML = `
    <a href="#hero" class="nav-logo">${DATA.name.split(' ')[0].toLowerCase()}<span>.dev</span></a>
    <ul class="nav-links">
      ${links.map(l => `<li><a href="#${l}">${l}</a></li>`).join('')}
    </ul>
    <button class="nav-toggle" id="navToggle" aria-label="Toggle menu">
      <span></span><span></span><span></span>
    </button>
  `;

  mobile.innerHTML = links.map(l => `<a href="#${l}">${l}</a>`).join('');

  document.getElementById('navToggle').addEventListener('click', () => {
    const toggle = document.getElementById('navToggle');
    toggle.classList.toggle('open');
    mobile.classList.toggle('open');
  });

  mobile.querySelectorAll('a').forEach(a => {
    a.addEventListener('click', () => {
      document.getElementById('navToggle').classList.remove('open');
      mobile.classList.remove('open');
    });
  });

  // Scroll-based nav highlight
  window.addEventListener('scroll', () => {
    nav.classList.toggle('scrolled', window.scrollY > 20);
    const sectionEls = document.querySelectorAll('section[id]');
    let current = '';
    sectionEls.forEach(s => {
      if (window.scrollY >= s.offsetTop - 120) current = s.id;
    });
    nav.querySelectorAll('.nav-links a').forEach(a => {
      a.classList.toggle('active', a.getAttribute('href') === `#${current}`);
    });
  });
}

// ─── Intersection Observer (scroll animations) ────────────────────────────
function initAnimations() {
  const io = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        e.target.classList.add('in');
        io.unobserve(e.target);
      }
    });
  }, { threshold: 0.12 });

  document.querySelectorAll('.fade-up').forEach(el => io.observe(el));
}

  renderContact();
  renderFooter();
  // Small delay so dynamic content is in the DOM before observing
  requestAnimationFrame(() => requestAnimationFrame(initAnimations));
});
